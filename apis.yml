    description: >-
      Facets is a platform engineering and infrastructure automation platform
      that unifies provisioning, deployment, and configuration into a single
      declarative model for governed, secure, and self-serve cloud operations.
      The Facets API provides programmatic access to blueprints, projects,
      environments, releases, resources, integrations, and access control,
      enabling automation of platform engineering workflows across cloud
      providers and Kubernetes.
